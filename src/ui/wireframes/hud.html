<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AoE Web — HUD Wireframe</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <link rel="stylesheet" href="../hud.css">
  <style>
    /* ── Wireframe-only overrides & demo helpers ─────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a2e0a;
      font-family: 'Palatino Linotype', Georgia, serif;
    }

    /* Simulated game terrain */
    #game-canvas-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 300px 200px at 20% 60%, #2a4a10 0%, transparent 70%),
        radial-gradient(ellipse 200px 150px at 70% 40%, #3a5a15 0%, transparent 60%),
        radial-gradient(ellipse 250px 180px at 50% 75%, #1e3a0a 0%, transparent 65%),
        radial-gradient(ellipse 120px 80px  at 85% 20%, #2e4e12 0%, transparent 55%),
        linear-gradient(160deg, #1a2e08 0%, #243810 40%, #1e3208 70%, #162808 100%);
    }

    /* ── Design token values inlined ─────────────────────────── */
    /* bg: #0e0a04 / #1a1208 / #2d2010 / #3d2f18 */
    /* panel-bg: rgba(18,12,4,0.94) */
    /* border: #5a4020  border-bright: #8a6030  gold: #d4aa20 */
    /* text-primary: #e8d890  text-secondary: #b09060  text-muted: #706040 */
    /* text-bright: #f8f0b0 */
    /* food: #d44030  wood: #5a8a2a  gold-res: #d4aa20  stone: #a0a0a0  pop: #80c0e0 */
    /* hp-high: #48c840  hp-medium: #d8c020  hp-low: #c83020 */

    /* ── HUD root ─────────────────────────────────────────────── */
    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Top bar ──────────────────────────────────────────────── */
    #hud-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: rgba(18, 12, 4, 0.94);
      border-bottom: 2px solid #5a4020;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      pointer-events: auto;
    }

    .resource-display {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 60px;
      font-size: 12px;
    }

    .resource-icon {
      width: 16px; height: 16px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .resource-icon.food  { background: #d44030; }
    .resource-icon.wood  { background: #5a8a2a; }
    .resource-icon.gold  { background: #d4aa20; }
    .resource-icon.stone { background: #a0a0a0; }

    .resource-value { color: #f8f0b0; font-variant-numeric: tabular-nums; }
    .resource-label { color: #706040; font-size: 10px; text-transform: uppercase; }

    .pop-display {
      display: flex;
      gap: 4px;
      font-size: 12px;
      color: #80c0e0;
      align-items: center;
    }
    .pop-icon { font-size: 13px; }

    .age-display {
      font-family: 'Palatino Linotype', Georgia, serif;
      font-size: 12px;
      color: #d4aa20;
      letter-spacing: 0.05em;
      margin-left: auto;
    }

    /* ── Minimap (overrides hud.css for wireframe demo) ──────── */
    #minimap-panel {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 200px; height: 200px;
      background: #0a1a0a;
      border: 2px solid #5a4020;
      border-bottom: none;
      overflow: hidden;
      cursor: crosshair;
      pointer-events: auto;
    }

    #minimap-canvas {
      width: 100%; height: 100%;
      display: block;
    }

    .minimap-viewport-rect {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.6);
      pointer-events: none;
      top: 30px; left: 20px;
      width: 110px; height: 80px;
    }

    /* ── Bottom panel ─────────────────────────────────────────── */
    #hud-bottom {
      position: fixed;
      bottom: 0; left: 0;
      right: 200px; /* leave space for 200px minimap */
      height: 170px;
      display: flex;
      background: rgba(18, 12, 4, 0.94);
      border-top: 2px solid #5a4020;
      pointer-events: auto;
    }

    /* ── Selection panel ──────────────────────────────────────── */
    #selection-panel {
      width: 240px;
      padding: 8px;
      border-right: 2px solid #5a4020;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }

    .unit-header {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .unit-portrait {
      width: 64px; height: 64px;
      background: #2d2010;
      border: 2px solid #5a4020;
      border-radius: 3px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #8a6030;
    }

    .unit-info { flex: 1; min-width: 0; }

    .unit-name {
      font-family: 'Palatino Linotype', Georgia, serif;
      font-size: 14px;
      color: #d4aa20;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hp-text {
      font-size: 10px;
      color: #b09060;
      margin-top: 2px;
    }

    .hp-bar-track {
      height: 6px;
      background: #1a1a1a;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }

    .hp-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.15s;
    }
    .hp-bar-fill.high { background: #48c840; }

    .unit-stats {
      display: flex;
      gap: 10px;
      font-size: 10px;
      color: #b09060;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .stat-item { white-space: nowrap; }
    .stat-label { color: #706040; }

    /* ── Action panel ─────────────────────────────────────────── */
    #action-panel {
      flex: 1;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(5, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 3px;
      align-content: start;
      justify-content: center;
    }

    .action-btn {
      width: 48px; height: 48px;
      background: #2d2010;
      border: 2px solid #5a4020;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.1s, box-shadow 0.1s;
    }

    .action-btn:hover {
      border-color: #d4aa20;
      box-shadow: 0 0 12px rgba(212, 170, 32, 0.5);
    }

    .action-btn.disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .action-btn.disabled:hover {
      border-color: #5a4020;
      box-shadow: none;
    }

    .btn-icon {
      width: 32px; height: 32px;
      background: #3d2f18;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .hotkey {
      position: absolute;
      bottom: 3px; right: 4px;
      font-size: 10px;
      color: #706040;
      font-family: 'Palatino Linotype', Georgia, serif;
      line-height: 1;
    }

    /* ── Drag rect ────────────────────────────────────────────── */
    .drag-rect {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.05);
      pointer-events: none;
      top: 120px; left: 200px;
      width: 180px; height: 100px;
    }

    /* ── FPS ──────────────────────────────────────────────────── */
    .fps-display {
      position: absolute;
      top: 40px; right: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      pointer-events: none;
      font-family: 'Courier New', monospace;
    }

    /* ── Section label overlay (wireframe only) ───────────────── */
    .wf-label {
      position: absolute;
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Simulated terrain background -->
  <div id="game-canvas-bg"></div>

  <!-- Drag selection rectangle (shown for demo) -->
  <div class="drag-rect"></div>

  <!-- HUD root -->
  <div id="hud">

    <!-- Top resource bar -->
    <div id="hud-top">
      <!-- Food -->
      <div class="resource-display">
        <div class="resource-icon food"></div>
        <span class="resource-value">350</span>
      </div>
      <!-- Wood -->
      <div class="resource-display">
        <div class="resource-icon wood"></div>
        <span class="resource-value">220</span>
      </div>
      <!-- Gold -->
      <div class="resource-display">
        <div class="resource-icon gold"></div>
        <span class="resource-value">80</span>
      </div>
      <!-- Stone -->
      <div class="resource-display">
        <div class="resource-icon stone"></div>
        <span class="resource-value">0</span>
      </div>
      <!-- Population -->
      <div class="pop-display">
        <span class="pop-icon">&#x1F465;</span>
        <span>14 / 100</span>
      </div>
      <!-- Age -->
      <div class="age-display">&#x2694; Feudal Age</div>
    </div>

    <!-- FPS counter -->
    <div class="fps-display">60 FPS</div>

    <!-- Minimap -->
    <div id="minimap-panel">
      <canvas id="minimap-canvas" width="200" height="200"></canvas>
      <div class="minimap-viewport-rect"></div>
    </div>

    <!-- Bottom panel -->
    <div id="hud-bottom">

      <!-- Selection panel -->
      <div id="selection-panel">
        <div class="unit-header">
          <div class="unit-portrait">&#x1F3C7;</div>
          <div class="unit-info">
            <div class="unit-name">Knight</div>
            <div class="hp-text">96 / 120</div>
            <div class="hp-bar-track">
              <div class="hp-bar-fill high" style="width:80%"></div>
            </div>
          </div>
        </div>
        <div class="unit-stats">
          <span class="stat-item"><span class="stat-label">ATK </span>10</span>
          <span class="stat-item"><span class="stat-label">ARM </span>2/3</span>
          <span class="stat-item"><span class="stat-label">LOS </span>4</span>
          <span class="stat-item"><span class="stat-label">SPD </span>1.35</span>
        </div>
      </div>

      <!-- Action panel -->
      <div id="action-panel">
        <!-- Row 1 -->
        <div class="action-btn" title="Move">
          <div class="btn-icon">&#x27A1;</div>
          <span class="hotkey">M</span>
        </div>
        <div class="action-btn" title="Stop">
          <div class="btn-icon">&#x23F9;</div>
          <span class="hotkey">S</span>
        </div>
        <div class="action-btn" title="Attack">
          <div class="btn-icon">&#x2694;</div>
          <span class="hotkey">A</span>
        </div>
        <div class="action-btn" title="Patrol">
          <div class="btn-icon">&#x21BA;</div>
          <span class="hotkey">P</span>
        </div>
        <div class="action-btn" title="Guard">
          <div class="btn-icon">&#x1F6E1;</div>
          <span class="hotkey">G</span>
        </div>
        <!-- Row 2 -->
        <div class="action-btn" title="Stance">
          <div class="btn-icon">&#x26A1;</div>
          <span class="hotkey">Q</span>
        </div>
        <!-- Empty / disabled slots -->
        <div class="action-btn disabled"></div>
        <div class="action-btn disabled"></div>
        <div class="action-btn disabled"></div>
        <div class="action-btn disabled"></div>
        <!-- Row 3 — all empty -->
        <div class="action-btn disabled"></div>
        <div class="action-btn disabled"></div>
        <div class="action-btn disabled"></div>
        <div class="action-btn disabled"></div>
        <div class="action-btn disabled"></div>
      </div>

    </div><!-- #hud-bottom -->
  </div><!-- #hud -->

  <script>
    // ── Draw minimap ────────────────────────────────────────────
    const canvas = document.getElementById('minimap-canvas');
    const ctx = canvas.getContext('2d');

    // Terrain base
    ctx.fillStyle = '#0a1a0a';
    ctx.fillRect(0, 0, 200, 200);

    // Terrain patches — forests
    const forests = [
      [10, 10, 40, 35], [120, 5, 55, 30], [5, 90, 30, 50],
      [160, 130, 35, 40], [70, 155, 45, 35], [140, 60, 25, 20]
    ];
    ctx.fillStyle = '#1a3a0a';
    forests.forEach(([x, y, w, h]) => {
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Water patch
    ctx.fillStyle = '#0a1e3a';
    ctx.beginPath();
    ctx.ellipse(170, 50, 25, 18, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Open ground patches
    ctx.fillStyle = '#183010';
    const grounds = [[50, 40, 80, 60], [90, 110, 70, 50]];
    grounds.forEach(([x, y, w, h]) => {
      ctx.fillRect(x, y, w, h);
    });

    // Player 1 units (blue — player-0)
    ctx.fillStyle = '#1060d8';
    [[55, 85], [60, 90], [65, 85], [70, 90], [58, 80]].forEach(([x, y]) => {
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
    });

    // Town center dot
    ctx.fillStyle = '#3090ff';
    ctx.beginPath();
    ctx.arc(62, 87, 4, 0, Math.PI * 2);
    ctx.fill();

    // Player 2 units (red — player-1) — enemy (visible through fog)
    ctx.fillStyle = '#d82020';
    [[130, 140], [135, 145], [140, 140]].forEach(([x, y]) => {
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
    });

    // Fog of war — darker regions
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, 50, 50);
    ctx.fillRect(0, 140, 60, 60);
    ctx.fillRect(170, 0, 30, 130);
  </script>
</body>
</html>
