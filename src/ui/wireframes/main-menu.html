<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AoE Web — Main Menu Wireframe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Palatino Linotype', Georgia, serif;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Full-screen background */
    .menu-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #2d1a08 0%, #0e0804 70%, #000 100%);
      color: #e8d890;
    }

    /* Ambient particle-like texture */
    .menu-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 30% 40%, rgba(80,40,0,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 70% 65%, rgba(60,25,0,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Card */
    .menu-card {
      position: relative;
      background: rgba(18, 12, 4, 0.94);
      border: 2px solid #8a6030;
      border-radius: 12px;
      padding: 32px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 0 60px rgba(100,50,0,0.2);
      min-width: 380px;
      max-width: 440px;
      width: 100%;
      animation: fadeIn 0.35s ease both;
    }

    /* Decorative horizontal rule */
    .deco-rule {
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, #8a6030 20%, #c8921a 50%, #8a6030 80%, transparent);
      margin: 12px 0;
    }

    /* Title */
    .game-title {
      font-size: 52px;
      color: #d4aa20;
      text-align: center;
      letter-spacing: 0.08em;
      text-shadow:
        0 0 12px rgba(212,170,32,0.5),
        2px 3px 0 #000,
        0 0 40px rgba(212,170,32,0.25);
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .game-subtitle {
      font-size: 12px;
      color: #706040;
      text-align: center;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Button group */
    .btn-group {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .menu-btn {
      display: block;
      width: 100%;
      padding: 12px 24px;
      margin-bottom: 8px;
      background: rgba(18, 12, 4, 0.94);
      border: 2px solid #5a4020;
      border-radius: 6px;
      color: #e8d890;
      font-family: 'Palatino Linotype', Georgia, serif;
      font-size: 17px;
      cursor: pointer;
      text-align: center;
      letter-spacing: 0.05em;
      transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .menu-btn:hover {
      border-color: #d4aa20;
      color: #f8f0b0;
      box-shadow: 0 0 12px rgba(212,170,32,0.5);
    }

    .menu-btn:active {
      background: #1a1208;
    }

    .menu-btn.primary {
      border-color: #d4aa20;
      color: #d4aa20;
      font-size: 22px;
    }

    .menu-btn.primary:hover {
      box-shadow: 0 0 18px rgba(212,170,32,0.6);
      color: #f8f0b0;
    }

    /* Version label */
    .version-label {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 10px;
      color: rgba(112, 96, 64, 0.6);
      letter-spacing: 0.05em;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>

  <div class="menu-screen">

    <div class="menu-card">
      <hr class="deco-rule">
      <h1 class="game-title">AGE OF WEB</h1>
      <p class="game-subtitle">A Browser-Based Strategy Game</p>
      <hr class="deco-rule">

      <div class="btn-group">
        <button class="menu-btn primary">Single Player</button>
        <button class="menu-btn">Multiplayer</button>
        <button class="menu-btn">Options</button>
      </div>
    </div>

    <div class="version-label">v0.1.0-dev</div>

  </div>

</body>
</html>
